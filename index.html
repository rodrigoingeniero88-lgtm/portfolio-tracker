<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #080d14; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

async function fetchYahooWithFallback(ticker, interval, range) {
  const res = await fetch(`/api/quote?ticker=${ticker}&interval=${interval}&range=${range}`,
    { signal: AbortSignal.timeout(10000) });
  if (!res.ok) throw new Error("API error");
  const data = await res.json();
  const result = data?.chart?.result?.[0];
  if (!result) throw new Error("No data");
  const closes = result.indicators.quote[0].close.filter(Boolean);
  if (!closes.length) throw new Error("No closes");
  const meta = result.meta;
  const prevClose = meta.chartPreviousClose || meta.previousClose || closes[closes.length - 2] || closes[closes.length - 1];
  const lastPrice = closes[closes.length - 1];
  const dayChange = prevClose ? ((lastPrice - prevClose) / prevClose) * 100 : null;
  return { closes, lastPrice, dayChange };
}

function calcRSI(closes, period = 14) {
  if (closes.length < period + 1) return null;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const d = closes[i] - closes[i - 1];
    if (d > 0) gains += d; else losses -= d;
  }
  let avgGain = gains / period, avgLoss = losses / period;
  for (let i = period + 1; i < closes.length; i++) {
    const d = closes[i] - closes[i - 1];
    avgGain = (avgGain * (period - 1) + (d > 0 ? d : 0)) / period;
    avgLoss = (avgLoss * (period - 1) + (d < 0 ? -d : 0)) / period;
  }
  if (avgLoss === 0) return 100;
  return Math.round((100 - 100 / (1 + avgGain / avgLoss)) * 100) / 100;
}

const INITIAL_POSITIONS = [
  { id: 1, ticker: "VITL", company: "Vital Farms", type: "largo", qty: 83.746, avgPrice: 13.02, currency: "USD", broker: "Fintual", status: "active", tesis: "Ventas +25% anual, sin deuda, castigada por problema contable ya resuelto. PO analistas $48. DCA." },
  { id: 2, ticker: "LTM", company: "LATAM Airlines", type: "largo", qty: 40000, avgPrice: 22.23, currency: "CLP", broker: "Chile", status: "salida", tesis: "Posición en salida. No agregar ni promediar." },
  { id: 3, ticker: "INVERCAP", company: "Invercap", type: "largo", qty: 300, avgPrice: 1928.6, currency: "CLP", broker: "Chile", status: "salida", tesis: "Posición en salida. No agregar ni promediar." },
];

const STOP_LOSS = { swing: 0.08, largo: 0.15 };
const fmt = (n, dec = 2) => n == null ? "—" : n.toLocaleString("en-US", { minimumFractionDigits: dec, maximumFractionDigits: dec });
const fmtPct = (n) => n == null ? "—" : `${n > 0 ? "+" : ""}${fmt(n)}%`;
const clr = (n) => n == null ? "#8899aa" : n >= 0 ? "#00e5a0" : "#ff4d6d";
const rsiColor = (r) => r == null ? "#8899aa" : r < 35 ? "#00e5a0" : r > 65 ? "#ff4d6d" : "#f0c040";
const rsiLabel = (r) => r == null ? "" : r < 35 ? "SOBREVENDIDO" : r > 65 ? "SOBRECOMPRADO" : "NEUTRAL";
const ff = "'IBM Plex Mono','Courier New',monospace";

function RSIBar({ value }) {
  if (value == null) return <span style={{ color: "#556" }}>—</span>;
  const pct = Math.min(Math.max(value, 0), 100);
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <div style={{ flex: 1, height: 6, background: "#1a2030", borderRadius: 3, position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", left: 0, top: 0, height: "100%", width: `${pct}%`, background: rsiColor(value), borderRadius: 3, transition: "width 0.5s" }} />
        <div style={{ position: "absolute", left: "35%", top: -2, width: 1, height: 10, background: "#334" }} />
        <div style={{ position: "absolute", left: "65%", top: -2, width: 1, height: 10, background: "#334" }} />
      </div>
      <span style={{ color: rsiColor(value), fontWeight: 700, fontSize: 13, minWidth: 36 }}>{fmt(value, 1)}</span>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("portfolio");
  const [positions, setPositions] = useState(() => {
    try { return JSON.parse(localStorage.getItem("pt_positions")) || INITIAL_POSITIONS; } catch { return INITIAL_POSITIONS; }
  });
  const [watchlist, setWatchlist] = useState(() => {
    try { return JSON.parse(localStorage.getItem("pt_watchlist")) || []; } catch { return []; }
  });
  const [transactions, setTransactions] = useState(() => {
    try { return JSON.parse(localStorage.getItem("pt_transactions")) || []; } catch { return []; }
  });
  const [priceData, setPriceData] = useState({});
  const [loading, setLoading] = useState({});
  const [lastUpdate, setLastUpdate] = useState(null);
  const [alerts, setAlerts] = useState([]);
  const [fetchStatus, setFetchStatus] = useState("");
  const [showExportModal, setShowExportModal] = useState(false);
  const [exportText, setExportText] = useState("");
  const [copyLabel, setCopyLabel] = useState("📋 COPIAR");
  const [showImportModal, setShowImportModal] = useState(false);
  const [importText, setImportText] = useState("");
  const [importError, setImportError] = useState("");
  const [importSuccess, setImportSuccess] = useState(false);
  const [showSellModal, setShowSellModal] = useState(false);
  const [sellPos, setSellPos] = useState(null);
  const [sellPrice, setSellPrice] = useState("");
  const [showAddPos, setShowAddPos] = useState(false);
  const [showAddWatch, setShowAddWatch] = useState(false);
  const [showAddTx, setShowAddTx] = useState(false);
  const [newPos, setNewPos] = useState({ ticker: "", company: "", type: "largo", qty: "", avgPrice: "", currency: "USD", broker: "IBKR", tesis: "" });
  const [newWatch, setNewWatch] = useState({ ticker: "", type: "observación", tesis: "" });
  const [newTx, setNewTx] = useState({ ticker: "", date: new Date().toISOString().split("T")[0], qty: "", price: "", action: "BUY", currency: "USD" });

  useEffect(() => { localStorage.setItem("pt_positions", JSON.stringify(positions)); }, [positions]);
  useEffect(() => { localStorage.setItem("pt_watchlist", JSON.stringify(watchlist)); }, [watchlist]);
  useEffect(() => { localStorage.setItem("pt_transactions", JSON.stringify(transactions)); }, [transactions]);

  const fetchAll = useCallback(async () => {
    const tickers = [...new Set([
      ...positions.filter(p => p.currency === "USD").map(p => p.ticker),
      ...watchlist.map(w => w.ticker),
    ])];
    if (!tickers.length) return;
    setFetchStatus("Cargando...");
    const newAlerts = [];
    const updates = {};
    let loaded = 0;
    await Promise.all(tickers.map(async (ticker) => {
      setLoading(l => ({ ...l, [ticker]: true }));
      try {
        const [daily, weekly] = await Promise.all([
          fetchYahooWithFallback(ticker, "1d", "3mo"),
          fetchYahooWithFallback(ticker, "1wk", "2y"),
        ]);
        const rsiD = calcRSI(daily.closes);
        const rsiW = calcRSI(weekly.closes);
        updates[ticker] = { price: daily.lastPrice, dayChange: daily.dayChange, rsiD, rsiW, ts: Date.now() };
        if (rsiD != null && (rsiD < 35 || rsiD > 65)) newAlerts.push({ ticker, type: "RSI Diario", value: rsiD, label: rsiLabel(rsiD) });
        if (rsiW != null && (rsiW < 35 || rsiW > 65)) newAlerts.push({ ticker, type: "RSI Semanal", value: rsiW, label: rsiLabel(rsiW) });
      } catch {
        updates[ticker] = { price: null, dayChange: null, rsiD: null, rsiW: null, error: true };
      }
      loaded++;
      setFetchStatus(`Cargando... ${loaded}/${tickers.length}`);
      setLoading(l => ({ ...l, [ticker]: false }));
    }));
    positions.forEach(p => {
      if (p.currency !== "USD") return;
      const pd = updates[p.ticker];
      if (!pd?.price) return;
      const pnlPct = (pd.price - p.avgPrice) / p.avgPrice;
      const sl = STOP_LOSS[p.type] || 0.08;
      if (pnlPct <= -sl) newAlerts.push({ ticker: p.ticker, type: "STOP LOSS", value: pnlPct * 100, label: `${p.type.toUpperCase()} — SL -${sl * 100}%` });
    });
    setPriceData(prev => ({ ...prev, ...updates }));
    setAlerts(newAlerts);
    setLastUpdate(new Date());
    const errors = Object.values(updates).filter(u => u.error).length;
    setFetchStatus(errors > 0 ? `${errors} sin datos` : "");
  }, [positions, watchlist]);

  useEffect(() => { fetchAll(); }, []);

  const usdPositions = positions.filter(p => p.currency === "USD");
  const totalCurrentUSD = usdPositions.reduce((acc, p) => {
    const pd = priceData[p.ticker];
    return acc + (pd?.price ? pd.price * p.qty : p.avgPrice * p.qty);
  }, 0);
  const totalCostUSD = usdPositions.reduce((acc, p) => acc + p.avgPrice * p.qty, 0);
  const totalUnrealizedPnL = totalCurrentUSD - totalCostUSD;
  const totalUnrealizedPct = totalCostUSD ? (totalUnrealizedPnL / totalCostUSD) * 100 : 0;
  const totalRealizedPnL = transactions.filter(t => t.action === "SELL" && t.realizedPnL != null).reduce((acc, t) => acc + t.realizedPnL, 0);

  const exportJSON = () => {
    const data = { exportedAt: new Date().toISOString(), positions, watchlist, transactions };
    const json = JSON.stringify(data, null, 2);
    setExportText(json);
    setShowExportModal(true);
    navigator.clipboard.writeText(json).catch(() => {});
  };
  const copyExport = () => {
    navigator.clipboard.writeText(exportText).catch(() => {});
    setCopyLabel("✓ COPIADO");
    setTimeout(() => setCopyLabel("📋 COPIAR"), 2000);
  };
  const importJSON = () => {
    setImportError("");
    try {
      const data = JSON.parse(importText);
      if (!data.positions) throw new Error("JSON inválido");
      setPositions(data.positions);
      if (data.watchlist) setWatchlist(data.watchlist);
      if (data.transactions) setTransactions(data.transactions);
      setImportSuccess(true);
      setImportText("");
      setTimeout(() => { setShowImportModal(false); setImportSuccess(false); }, 1500);
    } catch (e) { setImportError(e.message || "JSON inválido"); }
  };

  const addPosition = () => {
    if (!newPos.ticker || !newPos.qty || !newPos.avgPrice) return;
    const pos = { ...newPos, id: Date.now(), qty: +newPos.qty, avgPrice: +newPos.avgPrice, status: "active" };
    setPositions(p => [...p, pos]);
    setTransactions(t => [{ id: Date.now() + 1, ticker: pos.ticker, date: new Date().toISOString().split("T")[0], action: "BUY", qty: pos.qty, price: pos.avgPrice, currency: pos.currency, realizedPnL: null }, ...t]);
    setNewPos({ ticker: "", company: "", type: "largo", qty: "", avgPrice: "", currency: "USD", broker: "IBKR", tesis: "" });
    setShowAddPos(false);
  };

  const handleRemovePosition = (pos) => {
    setSellPos(pos);
    setSellPrice(priceData[pos.ticker]?.price ? String(priceData[pos.ticker].price.toFixed(2)) : "");
    setShowSellModal(true);
  };

  const confirmSell = () => {
    if (!sellPos || !sellPrice) return;
    const price = parseFloat(sellPrice);
    if (isNaN(price)) return;
    const realizedPnL = (price - sellPos.avgPrice) * sellPos.qty;
    setTransactions(t => [{ id: Date.now(), ticker: sellPos.ticker, date: new Date().toISOString().split("T")[0], action: "SELL", qty: sellPos.qty, price, currency: sellPos.currency, realizedPnL }, ...t]);
    setPositions(p => p.filter(x => x.id !== sellPos.id));
    setShowSellModal(false);
    setSellPos(null);
    setSellPrice("");
  };

  const addWatchlist = () => {
    if (!newWatch.ticker) return;
    setWatchlist(w => [...w, { ...newWatch, id: Date.now(), ticker: newWatch.ticker.toUpperCase() }]);
    setNewWatch({ ticker: "", type: "observación", tesis: "" });
    setShowAddWatch(false);
  };
  const removeWatch = (id) => setWatchlist(w => w.filter(x => x.id !== id));
  const openTradingView = (ticker) => window.open(`https://www.tradingview.com/chart/?symbol=${ticker}`, "tradingview_window");

  const addTransaction = () => {
    if (!newTx.ticker || !newTx.qty || !newTx.price) return;
    setTransactions(t => [{ ...newTx, id: Date.now(), qty: +newTx.qty, price: +newTx.price, realizedPnL: null }, ...t]);
    setNewTx({ ticker: "", date: new Date().toISOString().split("T")[0], qty: "", price: "", action: "BUY", currency: "USD" });
    setShowAddTx(false);
  };

  const s = {
    app: { fontFamily: ff, background: "#080d14", color: "#c8d6e5", minHeight: "100vh", paddingBottom: 60 },
    header: { background: "#0c1220", borderBottom: "1px solid #1e2d40", padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 },
    tabs: { display: "flex", background: "#0c1220", borderBottom: "1px solid #1e2d40", padding: "0 20px" },
    tab: (a) => ({ padding: "11px 16px", cursor: "pointer", fontSize: 10, letterSpacing: 2, fontWeight: 700, color: a ? "#00e5a0" : "#445", borderBottom: a ? "2px solid #00e5a0" : "2px solid transparent", background: "none", border: "none", fontFamily: ff }),
    card: { background: "#0c1624", border: "1px solid #1a2535", borderRadius: 8, padding: 18, marginBottom: 14 },
    label: { fontSize: 10, letterSpacing: 2, color: "#445", marginBottom: 4 },
    val: (c) => ({ fontSize: 20, fontWeight: 700, color: c || "#c8d6e5" }),
    table: { width: "100%", borderCollapse: "collapse", fontSize: 12 },
    th: { textAlign: "left", padding: "8px 10px", color: "#334", fontSize: 10, letterSpacing: 2, borderBottom: "1px solid #1a2535" },
    td: { padding: "10px 10px", borderBottom: "1px solid #111820", verticalAlign: "middle" },
    badge: (c) => ({ display: "inline-block", padding: "2px 7px", borderRadius: 3, fontSize: 10, fontWeight: 700, letterSpacing: 1, background: c + "22", color: c, border: `1px solid ${c}44` }),
    btn: (c = "#00e5a0") => ({ background: c + "18", color: c, border: `1px solid ${c}44`, borderRadius: 4, padding: "6px 12px", cursor: "pointer", fontSize: 11, fontFamily: ff, fontWeight: 700, letterSpacing: 1 }),
    input: { background: "#060b10", border: "1px solid #1e2d40", borderRadius: 4, color: "#c8d6e5", padding: "8px 12px", fontSize: 12, fontFamily: ff, width: "100%", boxSizing: "border-box" },
    modal: { position: "fixed", inset: 0, background: "#000c", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 },
    mbox: { background: "#0c1624", border: "1px solid #1e2d40", borderRadius: 10, padding: 24, width: 460, maxWidth: "95vw", maxHeight: "90vh", overflowY: "auto" },
    alertRow: (c) => ({ background: c + "18", border: `1px solid ${c}44`, borderRadius: 6, padding: "9px 14px", marginBottom: 7, display: "flex", alignItems: "center", justifyContent: "space-between" }),
  };
  const typeColor = (t) => t === "largo" ? "#5b9cf6" : t === "swing" ? "#f0c040" : "#8899aa";

  return (
    <div style={s.app}>
      <div style={s.header}>
        <div>
          <div style={{ fontSize: 16, fontWeight: 700, letterSpacing: 3, color: "#00e5a0" }}>◈ PORTFOLIO TRACKER</div>
          <div style={{ fontSize: 10, color: "#445", letterSpacing: 2 }}>IBKR · FINTUAL · CHILE</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ display: "flex", gap: 20, justifyContent: "flex-end", marginBottom: 6 }}>
            <div>
              <div style={{ fontSize: 9, color: "#445", letterSpacing: 1 }}>NO REALIZADO</div>
              <div style={{ color: clr(totalUnrealizedPnL), fontSize: 16, fontWeight: 700 }}>{totalUnrealizedPnL >= 0 ? "+" : ""}${fmt(totalUnrealizedPnL)} <span style={{ fontSize: 11 }}>({fmtPct(totalUnrealizedPct)})</span></div>
            </div>
            <div>
              <div style={{ fontSize: 9, color: "#445", letterSpacing: 1 }}>REALIZADO</div>
              <div style={{ color: clr(totalRealizedPnL), fontSize: 16, fontWeight: 700 }}>{totalRealizedPnL >= 0 ? "+" : ""}${fmt(totalRealizedPnL)}</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "flex-end" }}>
            <span style={{ fontSize: 10, color: "#334", alignSelf: "center" }}>{fetchStatus || (lastUpdate ? lastUpdate.toLocaleTimeString() : "—")}</span>
            <button onClick={fetchAll} style={{ ...s.btn(), padding: "4px 9px", fontSize: 10 }}>↺ REF</button>
            <button onClick={() => { setShowImportModal(true); setImportText(""); setImportError(""); }} style={{ ...s.btn("#a78bfa"), padding: "4px 9px", fontSize: 10 }}>⬆ IMPORT</button>
            <button onClick={exportJSON} style={{ ...s.btn("#f0c040"), padding: "4px 9px", fontSize: 10 }}>⬇ EXPORT</button>
          </div>
        </div>
      </div>

      {alerts.length > 0 && (
        <div style={{ padding: "10px 20px 0" }}>
          {alerts.map((a, i) => {
            const c = a.type === "STOP LOSS" ? "#ff4d6d" : rsiColor(a.value);
            return <div key={i} style={s.alertRow(c)}>
              <span style={{ color: c, fontWeight: 700, fontSize: 11 }}>⚠ {a.type} — {a.ticker}</span>
              <span style={{ color: "#8899aa", fontSize: 10 }}>{a.label}</span>
            </div>;
          })}
        </div>
      )}

      <div style={s.tabs}>
        {["portfolio", "watchlist", "transacciones"].map(t => (
          <button key={t} style={s.tab(tab === t)} onClick={() => setTab(t)}>{t.toUpperCase()}</button>
        ))}
      </div>

      <div style={{ padding: "18px 20px" }}>

        {tab === "portfolio" && (<>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 14 }}>
            {[
              { label: "VALOR USD", val: `$${fmt(totalCurrentUSD)}`, c: "#c8d6e5" },
              { label: "P&L NO REALIZADO", val: `${totalUnrealizedPnL >= 0 ? "+" : ""}$${fmt(totalUnrealizedPnL)}`, c: clr(totalUnrealizedPnL) },
              { label: "P&L %", val: fmtPct(totalUnrealizedPct), c: clr(totalUnrealizedPct) },
              { label: "P&L REALIZADO", val: `${totalRealizedPnL >= 0 ? "+" : ""}$${fmt(totalRealizedPnL)}`, c: clr(totalRealizedPnL) },
            ].map(item => (
              <div key={item.label} style={s.card}>
                <div style={s.label}>{item.label}</div>
                <div style={s.val(item.c)}>{item.val}</div>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <span style={{ fontSize: 10, letterSpacing: 2, color: "#445" }}>POSICIONES</span>
            <button style={s.btn()} onClick={() => setShowAddPos(true)}>+ AGREGAR</button>
          </div>
          <div style={{ overflowX: "auto" }}>
            <table style={s.table}>
              <thead>
                <tr>{["TICKER","TIPO","QTY","PROM","PRECIO","VALOR","PESO%","P&L","P&L%","DIST SL","RSI D","RSI W",""].map(h => <th key={h} style={s.th}>{h}</th>)}</tr>
              </thead>
              <tbody>
                {positions.map(pos => {
                  const pd = priceData[pos.ticker];
                  const price = pd?.price;
                  const valor = price ? price * pos.qty : null;
                  const cost = pos.avgPrice * pos.qty;
                  const pnl = valor != null ? valor - cost : null;
                  const pnlPct = pnl != null ? (pnl / cost) * 100 : null;
                  const sl = STOP_LOSS[pos.type] || 0.08;
                  const distToSL = pnlPct != null ? (pnlPct - (-sl * 100)) : null;
                  const nearSL = distToSL != null && distToSL < sl * 100 * 0.3;
                  const peso = valor != null && totalCurrentUSD > 0 ? (valor / totalCurrentUSD) * 100 : null;
                  return (
                    <tr key={pos.id} style={{ opacity: pos.status === "salida" ? 0.55 : 1, background: nearSL ? "#ff4d6d07" : "transparent" }}>
                      <td style={s.td}>
                        <div style={{ fontWeight: 700, color: "#e0ecf8" }}>{pos.ticker}</div>
                        <div style={{ fontSize: 9, color: "#445" }}>{pos.company}</div>
                        {pos.status === "salida" && <div style={{ fontSize: 9, color: "#ff4d6d" }}>EN SALIDA</div>}
                      </td>
                      <td style={s.td}><span style={s.badge(typeColor(pos.type))}>{pos.type.toUpperCase()}</span></td>
                      <td style={s.td}>{fmt(pos.qty, pos.qty % 1 === 0 ? 0 : 3)}</td>
                      <td style={s.td}>{fmt(pos.avgPrice)} <span style={{ fontSize: 9, color: "#445" }}>{pos.currency}</span></td>
                      <td style={s.td}>{loading[pos.ticker] ? <span style={{ color: "#334" }}>…</span> : price ? `$${fmt(price)}` : pd?.error ? <span style={{ fontSize: 9, color: "#ff4d6d" }}>ERR</span> : "—"}</td>
                      <td style={s.td}>{valor ? `$${fmt(valor)}` : "—"}</td>
                      <td style={s.td}><span style={{ color: "#8899aa" }}>{peso != null ? `${fmt(peso, 1)}%` : "—"}</span></td>
                      <td style={s.td}><span style={{ color: clr(pnl) }}>{pnl != null ? `${pnl >= 0 ? "+" : ""}$${fmt(pnl)}` : "—"}</span></td>
                      <td style={s.td}><span style={{ color: clr(pnlPct) }}>{fmtPct(pnlPct)}</span></td>
                      <td style={s.td}>
                        {distToSL != null && pos.currency === "USD" ? (
                          <span style={{ color: distToSL < 3 ? "#ff4d6d" : distToSL < 8 ? "#f0c040" : "#556", fontSize: 11, fontWeight: distToSL < 3 ? 700 : 400 }}>
                            {distToSL > 0 ? `${fmt(distToSL, 1)}%` : "⚠ SL"}
                          </span>
                        ) : "—"}
                      </td>
                      <td style={s.td}><RSIBar value={pd?.rsiD} /></td>
                      <td style={s.td}><RSIBar value={pd?.rsiW} /></td>
                      <td style={s.td}><button style={{ ...s.btn("#ff4d6d"), padding: "2px 7px" }} onClick={() => handleRemovePosition(pos)}>✕</button></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </>)}

        {tab === "watchlist" && (<>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <span style={{ fontSize: 10, letterSpacing: 2, color: "#445" }}>WATCHLIST · click abre TradingView</span>
            <button style={s.btn()} onClick={() => setShowAddWatch(true)}>+ AGREGAR</button>
          </div>
          {watchlist.length === 0 && <div style={{ color: "#334", padding: 24, textAlign: "center", fontSize: 12 }}>Watchlist vacío.</div>}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(260px,1fr))", gap: 12 }}>
            {watchlist.map(w => {
              const pd = priceData[w.ticker];
              return (
                <div key={w.id} style={{ ...s.card, position: "relative", cursor: "pointer", transition: "border-color 0.2s" }}
                  onClick={() => openTradingView(w.ticker)}
                  onMouseEnter={e => e.currentTarget.style.borderColor = "#00e5a044"}
                  onMouseLeave={e => e.currentTarget.style.borderColor = "#1a2535"}>
                  <button style={{ position: "absolute", top: 10, right: 10, ...s.btn("#ff4d6d"), padding: "2px 7px", zIndex: 2 }}
                    onClick={e => { e.stopPropagation(); removeWatch(w.id); }}>✕</button>
                  <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 4 }}>
                    <span style={{ fontWeight: 700, fontSize: 15, color: "#e0ecf8" }}>{w.ticker}</span>
                    <span style={s.badge(typeColor(w.type))}>{w.type.toUpperCase()}</span>
                  </div>
                  <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 8 }}>
                    <div style={{ fontSize: 18, fontWeight: 700, color: "#c8d6e5" }}>
                      {loading[w.ticker] ? <span style={{ color: "#334", fontSize: 12 }}>cargando…</span> : pd?.error ? <span style={{ color: "#ff4d6d", fontSize: 11 }}>sin datos</span> : pd?.price ? `$${fmt(pd.price)}` : "—"}
                    </div>
                    {pd?.dayChange != null && (
                      <span style={{ fontSize: 12, fontWeight: 700, color: clr(pd.dayChange) }}>
                        {pd.dayChange >= 0 ? "+" : ""}{fmt(pd.dayChange, 2)}%
                      </span>
                    )}
                  </div>
                  <div style={{ marginBottom: 6 }}>
                    <div style={{ fontSize: 9, color: "#445", marginBottom: 2 }}>RSI DIARIO</div>
                    <RSIBar value={pd?.rsiD} />
                    {pd?.rsiD != null && (pd.rsiD < 35 || pd.rsiD > 65) && <div style={{ fontSize: 9, color: rsiColor(pd.rsiD), marginTop: 2 }}>{rsiLabel(pd.rsiD)}</div>}
                  </div>
                  <div style={{ marginBottom: w.tesis ? 10 : 0 }}>
                    <div style={{ fontSize: 9, color: "#445", marginBottom: 2 }}>RSI SEMANAL</div>
                    <RSIBar value={pd?.rsiW} />
                  </div>
                  {w.tesis && <div style={{ fontSize: 10, color: "#556", borderTop: "1px solid #1a2535", paddingTop: 8, marginTop: 8 }}>{w.tesis}</div>}
                  <div style={{ fontSize: 9, color: "#334", marginTop: 8, textAlign: "right" }}>↗ TradingView</div>
                </div>
              );
            })}
          </div>
        </>)}

        {tab === "transacciones" && (<>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <span style={{ fontSize: 10, letterSpacing: 2, color: "#445" }}>TRANSACCIONES</span>
            <button style={s.btn()} onClick={() => setShowAddTx(true)}>+ REGISTRAR</button>
          </div>
          {transactions.length === 0 && <div style={{ color: "#334", padding: 24, textAlign: "center", fontSize: 12 }}>Sin transacciones.</div>}
          <table style={s.table}>
            <thead><tr>{["FECHA","ACCIÓN","TICKER","QTY","PRECIO","TOTAL","P&L REALIZADO","MONEDA"].map(h => <th key={h} style={s.th}>{h}</th>)}</tr></thead>
            <tbody>
              {transactions.map(tx => (
                <tr key={tx.id}>
                  <td style={s.td}>{tx.date}</td>
                  <td style={s.td}><span style={s.badge(tx.action === "BUY" ? "#00e5a0" : "#ff4d6d")}>{tx.action}</span></td>
                  <td style={{ ...s.td, fontWeight: 700, color: "#e0ecf8" }}>{tx.ticker}</td>
                  <td style={s.td}>{fmt(tx.qty, 3)}</td>
                  <td style={s.td}>${fmt(tx.price)}</td>
                  <td style={s.td}>${fmt(tx.qty * tx.price)}</td>
                  <td style={s.td}>{tx.realizedPnL != null ? <span style={{ color: clr(tx.realizedPnL), fontWeight: 700 }}>{tx.realizedPnL >= 0 ? "+" : ""}${fmt(tx.realizedPnL)}</span> : <span style={{ color: "#334" }}>—</span>}</td>
                  <td style={s.td}><span style={{ color: "#445", fontSize: 10 }}>{tx.currency}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </>)}
      </div>

      {/* SELL MODAL */}
      {showSellModal && sellPos && (
        <div style={s.modal} onClick={() => setShowSellModal(false)}>
          <div style={s.mbox} onClick={e => e.stopPropagation()}>
            <div style={{ fontWeight: 700, marginBottom: 14, letterSpacing: 2, color: "#ff4d6d" }}>CERRAR POSICIÓN — {sellPos.ticker}</div>
            <div style={{ fontSize: 11, color: "#556", marginBottom: 16, lineHeight: 1.8 }}>
              <div>Cantidad: <span style={{ color: "#c8d6e5" }}>{fmt(sellPos.qty, 3)}</span></div>
              <div>Precio promedio: <span style={{ color: "#c8d6e5" }}>${fmt(sellPos.avgPrice)}</span></div>
              <div>Costo total: <span style={{ color: "#c8d6e5" }}>${fmt(sellPos.avgPrice * sellPos.qty)}</span></div>
            </div>
            <div style={{ marginBottom: 14 }}>
              <div style={s.label}>PRECIO DE VENTA</div>
              <input style={s.input} value={sellPrice} type="number" placeholder="0.00"
                onChange={e => setSellPrice(e.target.value)} autoFocus />
              {sellPrice && !isNaN(parseFloat(sellPrice)) && (
                <div style={{ marginTop: 8, fontSize: 12 }}>
                  <span style={{ color: "#445" }}>P&L estimado: </span>
                  <span style={{ color: clr((parseFloat(sellPrice) - sellPos.avgPrice) * sellPos.qty), fontWeight: 700 }}>
                    {(parseFloat(sellPrice) - sellPos.avgPrice) * sellPos.qty >= 0 ? "+" : ""}
                    ${fmt((parseFloat(sellPrice) - sellPos.avgPrice) * sellPos.qty)}
                  </span>
                </div>
              )}
            </div>
            <div style={{ display: "flex", gap: 9 }}>
              <button style={{ ...s.btn("#ff4d6d"), flex: 1, padding: "10px" }} onClick={confirmSell}>CONFIRMAR VENTA</button>
              <button style={{ ...s.btn("#445"), flex: 1, padding: "10px" }} onClick={() => setShowSellModal(false)}>CANCELAR</button>
            </div>
          </div>
        </div>
      )}

      {/* IMPORT MODAL */}
      {showImportModal && (
        <div style={s.modal} onClick={() => setShowImportModal(false)}>
          <div style={{ ...s.mbox, width: 500 }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <span style={{ fontWeight: 700, letterSpacing: 2, color: "#a78bfa", fontSize: 12 }}>⬆ IMPORTAR JSON</span>
              <button style={{ ...s.btn("#445"), padding: "4px 10px" }} onClick={() => setShowImportModal(false)}>✕</button>
            </div>
            <textarea value={importText} onChange={e => { setImportText(e.target.value); setImportError(""); }}
              placeholder='{ "positions": [...], "watchlist": [...] }'
              style={{ width: "100%", height: 240, background: "#060b10", border: `1px solid ${importError ? "#ff4d6d" : "#1e2d40"}`, borderRadius: 6, color: "#c8d6e5", fontSize: 10, fontFamily: ff, padding: 12, boxSizing: "border-box", resize: "none", lineHeight: 1.6 }} />
            {importError && <div style={{ color: "#ff4d6d", fontSize: 11, marginTop: 6 }}>⚠ {importError}</div>}
            {importSuccess && <div style={{ color: "#00e5a0", fontSize: 11, marginTop: 6 }}>✓ Importado correctamente</div>}
            <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
              <button style={{ ...s.btn("#a78bfa"), flex: 1, padding: "9px" }} onClick={importJSON}>IMPORTAR</button>
              <button style={{ ...s.btn("#445"), flex: 1, padding: "9px" }} onClick={() => setShowImportModal(false)}>CANCELAR</button>
            </div>
          </div>
        </div>
      )}

      {/* EXPORT MODAL */}
      {showExportModal && (
        <div style={s.modal} onClick={() => setShowExportModal(false)}>
          <div style={{ ...s.mbox, width: 500 }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <span style={{ fontWeight: 700, letterSpacing: 2, color: "#f0c040", fontSize: 12 }}>⬇ EXPORT JSON</span>
              <button style={{ ...s.btn("#445"), padding: "4px 10px" }} onClick={() => setShowExportModal(false)}>✕</button>
            </div>
            <textarea readOnly value={exportText} onFocus={e => e.target.select()} onClick={e => e.target.select()}
              style={{ width: "100%", height: 260, background: "#060b10", border: "1px solid #1e2d40", borderRadius: 6, color: "#6a9ab8", fontSize: 10, fontFamily: ff, padding: 12, boxSizing: "border-box", resize: "none", lineHeight: 1.6 }} />
            <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
              <button style={{ ...s.btn("#f0c040"), flex: 1, padding: "9px" }} onClick={copyExport}>{copyLabel}</button>
              <button style={{ ...s.btn("#445"), flex: 1, padding: "9px" }} onClick={() => setShowExportModal(false)}>CERRAR</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD POSITION */}
      {showAddPos && (
        <div style={s.modal} onClick={() => setShowAddPos(false)}>
          <div style={s.mbox} onClick={e => e.stopPropagation()}>
            <div style={{ fontWeight: 700, marginBottom: 14, letterSpacing: 2, color: "#00e5a0" }}>+ NUEVA POSICIÓN</div>
            {[{ label: "TICKER", key: "ticker", ph: "AAPL" }, { label: "EMPRESA", key: "company", ph: "Apple Inc." }, { label: "CANTIDAD", key: "qty", ph: "100", type: "number" }, { label: "PRECIO PROMEDIO", key: "avgPrice", ph: "150.00", type: "number" }, { label: "BROKER", key: "broker", ph: "IBKR" }, { label: "TESIS", key: "tesis", ph: "Razón..." }].map(f => (
              <div key={f.key} style={{ marginBottom: 9 }}>
                <div style={s.label}>{f.label}</div>
                <input style={s.input} value={newPos[f.key]} type={f.type || "text"} placeholder={f.ph} onChange={e => setNewPos(p => ({ ...p, [f.key]: e.target.value }))} />
              </div>
            ))}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9, marginBottom: 14 }}>
              <div><div style={s.label}>TIPO</div><select style={s.input} value={newPos.type} onChange={e => setNewPos(p => ({ ...p, type: e.target.value }))}><option value="largo">Largo plazo</option><option value="swing">Swing</option><option value="observación">Observación</option></select></div>
              <div><div style={s.label}>MONEDA</div><select style={s.input} value={newPos.currency} onChange={e => setNewPos(p => ({ ...p, currency: e.target.value }))}><option value="USD">USD</option><option value="CLP">CLP</option></select></div>
            </div>
            <div style={{ display: "flex", gap: 9 }}>
              <button style={{ ...s.btn(), flex: 1, padding: "10px" }} onClick={addPosition}>AGREGAR</button>
              <button style={{ ...s.btn("#445"), flex: 1, padding: "10px" }} onClick={() => setShowAddPos(false)}>CANCELAR</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD WATCHLIST */}
      {showAddWatch && (
        <div style={s.modal} onClick={() => setShowAddWatch(false)}>
          <div style={s.mbox} onClick={e => e.stopPropagation()}>
            <div style={{ fontWeight: 700, marginBottom: 14, letterSpacing: 2, color: "#00e5a0" }}>+ WATCHLIST</div>
            <div style={{ marginBottom: 9 }}><div style={s.label}>TICKER</div><input style={s.input} value={newWatch.ticker} placeholder="MSFT" onChange={e => setNewWatch(p => ({ ...p, ticker: e.target.value.toUpperCase() }))} /></div>
            <div style={{ marginBottom: 9 }}><div style={s.label}>TIPO</div><select style={s.input} value={newWatch.type} onChange={e => setNewWatch(p => ({ ...p, type: e.target.value }))}><option value="observación">Observación</option><option value="swing">Swing</option><option value="largo">Largo plazo</option></select></div>
            <div style={{ marginBottom: 14 }}><div style={s.label}>TESIS</div><input style={s.input} value={newWatch.tesis} placeholder="Razón..." onChange={e => setNewWatch(p => ({ ...p, tesis: e.target.value }))} /></div>
            <div style={{ display: "flex", gap: 9 }}>
              <button style={{ ...s.btn(), flex: 1, padding: "10px" }} onClick={addWatchlist}>AGREGAR</button>
              <button style={{ ...s.btn("#445"), flex: 1, padding: "10px" }} onClick={() => setShowAddWatch(false)}>CANCELAR</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD TRANSACTION */}
      {showAddTx && (
        <div style={s.modal} onClick={() => setShowAddTx(false)}>
          <div style={s.mbox} onClick={e => e.stopPropagation()}>
            <div style={{ fontWeight: 700, marginBottom: 14, letterSpacing: 2, color: "#00e5a0" }}>+ TRANSACCIÓN MANUAL</div>
            {[{ label: "TICKER", key: "ticker", ph: "AAPL" }, { label: "FECHA", key: "date", type: "date" }, { label: "CANTIDAD", key: "qty", ph: "100", type: "number" }, { label: "PRECIO", key: "price", ph: "150.00", type: "number" }].map(f => (
              <div key={f.key} style={{ marginBottom: 9 }}><div style={s.label}>{f.label}</div><input style={s.input} value={newTx[f.key]} type={f.type || "text"} placeholder={f.ph} onChange={e => setNewTx(p => ({ ...p, [f.key]: e.target.value }))} /></div>
            ))}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9, marginBottom: 14 }}>
              <div><div style={s.label}>ACCIÓN</div><select style={s.input} value={newTx.action} onChange={e => setNewTx(p => ({ ...p, action: e.target.value }))}><option value="BUY">BUY</option><option value="SELL">SELL</option></select></div>
              <div><div style={s.label}>MONEDA</div><select style={s.input} value={newTx.currency} onChange={e => setNewTx(p => ({ ...p, currency: e.target.value }))}><option value="USD">USD</option><option value="CLP">CLP</option></select></div>
            </div>
            <div style={{ display: "flex", gap: 9 }}>
              <button style={{ ...s.btn(), flex: 1, padding: "10px" }} onClick={addTransaction}>REGISTRAR</button>
              <button style={{ ...s.btn("#445"), flex: 1, padding: "10px" }} onClick={() => setShowAddTx(false)}>CANCELAR</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
</html>
