const { useState, useEffect, useCallback, useMemo } = React;

async function fetchYahoo(ticker, interval, range) {
  const res = await fetch(`/api/quote?ticker=${ticker}&interval=${interval}&range=${range}`,
    { signal: AbortSignal.timeout(10000) });
  if (!res.ok) throw new Error("API error");
  const data = await res.json();
  const result = data?.chart?.result?.[0];
  if (!result) throw new Error("No data");
  const closes = result.indicators.quote[0].close.filter(Boolean);
  if (!closes.length) throw new Error("No closes");
  const lastPrice = closes[closes.length - 1];
  const prevPrice = closes.length > 1 ? closes[closes.length - 2] : lastPrice;
  const dayChange = interval === "1d" ? ((lastPrice - prevPrice) / prevPrice) * 100 : null;
  return { closes, lastPrice, dayChange };
}

async function fetchInfo(ticker) {
  try {
    const res = await fetch(`/api/info?ticker=${ticker}`, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

async function fetchUSDCLP() {
  try {
    const res = await fetch(`/api/quote?ticker=USDCLP%3DX&interval=1d&range=5d`, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) return null;
    const data = await res.json();
    const result = data?.chart?.result?.[0];
    if (!result) return null;
    const closes = result.indicators.quote[0].close.filter(Boolean);
    return closes[closes.length - 1];
  } catch { return null; }
}

function calcRSI(closes, period = 14) {
  if (closes.length < period + 1) return null;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const d = closes[i] - closes[i - 1];
    if (d > 0) gains += d; else losses -= d;
  }
  let avgGain = gains / period, avgLoss = losses / period;
  for (let i = period + 1; i < closes.length; i++) {
    const d = closes[i] - closes[i - 1];
    avgGain = (avgGain * (period - 1) + (d > 0 ? d : 0)) / period;
    avgLoss = (avgLoss * (period - 1) + (d < 0 ? -d : 0)) / period;
  }
  if (avgLoss === 0) return 100;
  return Math.round((100 - 100 / (1 + avgGain / avgLoss)) * 100) / 100;
}

const STOP_LOSS = { swing: 0.08, largo: 0.15 };
const fmt = (n, dec = 2) => n == null ? "—" : n.toLocaleString("en-US", { minimumFractionDigits: dec, maximumFractionDigits: dec });
const fmtCLP = (n, dec = 2) => n == null ? "—" : `$${n.toLocaleString("es-CL", { minimumFractionDigits: dec, maximumFractionDigits: dec })}`;

const clr = (n) => n == null ? "#8899aa" : n >= 0 ? "#00e5a0" : "#ff4d6d";
const rsiColor = (r) => r == null ? "#8899aa" : r < 35 ? "#00e5a0" : r > 65 ? "#ff4d6d" : "#f0c040";

function RSIBar({ value }) {
  if (value == null) return <span style={{ color: "#556" }}>—</span>;
  const pct = Math.min(Math.max(value, 0), 100);
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <div style={{ flex: 1, height: 6, background: "#1a2030", borderRadius: 3, position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", left: 0, top: 0, height: "100%", width: `${pct}%`, background: rsiColor(value), borderRadius: 3, transition: "width 0.5s" }} />
        <div style={{ position: "absolute", left: "35%", top: -2, width: 1, height: 10, background: "#334" }} />
        <div style={{ position: "absolute", left: "65%", top: -2, width: 1, height: 10, background: "#334" }} />
      </div>
      <span style={{ color: rsiColor(value), fontWeight: 700, fontSize: 13, minWidth: 36 }}>{fmt(value, 1)}</span>
    </div>
  );
}

        <textarea value={note} onChange={e => setNote(e.target.value)} autoFocus placeholder="Escribí tus notas..."
          style={{ width: "100%", height: 160, background: "#060b10", border: "1px solid #1e2d40", borderRadius: 6, color: "#c8d6e5", fontSize: 12, fontFamily: ff, padding: 12, boxSizing: "border-box", resize: "none", lineHeight: 1.6 }} />
        <div style={{ display: "flex", gap: 8, marginTop: 12 }}>

          <button style={{ flex: 1, padding: "9px", background: "transparent", color: "#8899aa", border: "1px solid #1e2d40", borderRadius: 4, cursor: "pointer", fontFamily: ff, fontWeight: 700, fontSize: 11 }} onClick={onClose}>CANCELAR</button>

}

        ))}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9, marginBottom: 16 }}>
          <div><div style={{ fontSize: 10, letterSpacing: 2, color: "#445", marginBottom: 4 }}>ACCIÓN</div>
            <select style={inp} value={form.action} onChange={e => setForm(p => ({ ...p, action: e.target.value }))}><option value="BUY">BUY</option><option value="SELL">SELL</option></select></div>
          <div><div style={{ fontSize: 10, letterSpacing: 2, color: "#445", marginBottom: 4 }}>BOLSA</div>
            <select style={inp} value={form.currency} onChange={e => setForm(p => ({ ...p, currency: e.target.value }))}><option value="USD">NYSE (USD)</option><option value="CLP">BSC (CLP)</option></select></div>
        </div>
        <div style={{ display: "flex", gap: 9 }}>

            onClick={() => onSave({ ...form, qty: +form.qty, price: +form.price })}>GUARDAR</button>
          <button style={{ flex: 1, padding: "10px", background: "transparent", color: "#8899aa", border: "1px solid #1e2d40", borderRadius: 4, cursor: "pointer", fontFamily: ff, fontWeight: 700, fontSize: 11 }} onClick={onClose}>CANCELAR</button>
        </div>

}

function App() {
  const [tab, setTab] = useState("portfolio");
  const [marketFilter, setMarketFilter] = useState("ambos");
  const [watchSearch, setWatchSearch] = useState("");
  const [watchSort, setWatchSort] = useState("ticker"); // ticker | price | rsiD | dayChange | type
  const [watchSortDir, setWatchSortDir] = useState(1); // 1 asc, -1 desc

  const [positions, setPositions] = useState(() => { try { return JSON.parse(localStorage.getItem("pt_positions")) || INITIAL_POSITIONS; } catch { return INITIAL_POSITIONS; } });
  const [watchlist, setWatchlist] = useState(() => { try { return JSON.parse(localStorage.getItem("pt_watchlist")) || []; } catch { return []; } });
  const [transactions, setTransactions] = useState(() => { try { const s = JSON.parse(localStorage.getItem("pt_transactions")); return s && s.length > 0 ? s : INITIAL_TRANSACTIONS; } catch { return INITIAL_TRANSACTIONS; } });
  const [manualPrices, setManualPrices] = useState(() => { try { return JSON.parse(localStorage.getItem("pt_manual")) || {}; } catch { return {}; } });
  const [companyInfo, setCompanyInfo] = useState(() => { try { return JSON.parse(localStorage.getItem("pt_info")) || {}; } catch { return {}; } });
  const [priceData, setPriceData] = useState({});
  const [usdClp, setUsdClp] = useState(null);
  const [loading, setLoading] = useState({});
  const [lastUpdate, setLastUpdate] = useState(null);
  const [alerts, setAlerts] = useState([]);
  const [fetchStatus, setFetchStatus] = useState("");
  const [editingTicker, setEditingTicker] = useState(null);
  const [editVal, setEditVal] = useState("");
  const [noteModal, setNoteModal] = useState(null);
  const [editTxModal, setEditTxModal] = useState(null);
  const [showExportModal, setShowExportModal] = useState(false);
  const [exportText, setExportText] = useState("");
  const [copyLabel, setCopyLabel] = useState("📋 COPIAR");
  const [showImportModal, setShowImportModal] = useState(false);
  const [importText, setImportText] = useState("");
  const [importError, setImportError] = useState("");
  const [importSuccess, setImportSuccess] = useState(false);
  const [showSellModal, setShowSellModal] = useState(false);
  const [sellPos, setSellPos] = useState(null);
  const [sellPrice, setSellPrice] = useState("");
  const [showAddPos, setShowAddPos] = useState(false);
  const [showAddWatch, setShowAddWatch] = useState(false);
  const [showAddTx, setShowAddTx] = useState(false);
  const [newPos, setNewPos] = useState({ ticker: "", company: "", type: "largo", qty: "", avgPrice: "", currency: "USD", broker: "IBKR", tesis: "", nota: "" });
  const [newWatch, setNewWatch] = useState({ ticker: "", type: "observación", tesis: "", nota: "" });
  const [newTx, setNewTx] = useState({ ticker: "", date: new Date().toISOString().split("T")[0], qty: "", price: "", action: "BUY", currency: "USD" });

  useEffect(() => { localStorage.setItem("pt_positions", JSON.stringify(positions)); }, [positions]);
  useEffect(() => { localStorage.setItem("pt_watchlist", JSON.stringify(watchlist)); }, [watchlist]);
  useEffect(() => { localStorage.setItem("pt_transactions", JSON.stringify(transactions)); }, [transactions]);
  useEffect(() => { localStorage.setItem("pt_manual", JSON.stringify(manualPrices)); }, [manualPrices]);
  useEffect(() => { localStorage.setItem("pt_info", JSON.stringify(companyInfo)); }, [companyInfo]);

  const fetchAll = useCallback(async () => {
    const usdTickers = [...new Set([...positions.filter(p => p.currency === "USD").map(p => p.ticker), ...watchlist.map(w => w.ticker)])];
    setFetchStatus("Cargando...");
    const newAlerts = [];
    const updates = {};
    let loaded = 0;
    const total = usdTickers.length + 1;
    const rate = await fetchUSDCLP();
    if (rate) setUsdClp(rate);
    loaded++; setFetchStatus(`Cargando... ${loaded}/${total}`);
    await Promise.all(usdTickers.map(async (ticker) => {
      setLoading(l => ({ ...l, [ticker]: true }));
      try {
        const [daily, weekly] = await Promise.all([fetchYahoo(ticker, "1d", "3mo"), fetchYahoo(ticker, "1wk", "2y")]);
        const rsiD = calcRSI(daily.closes);
        const rsiW = calcRSI(weekly.closes);
        updates[ticker] = { price: daily.lastPrice, dayChange: daily.dayChange, rsiD, rsiW, ts: Date.now() };
      } catch { updates[ticker] = { price: null, dayChange: null, rsiD: null, rsiW: null, error: true }; }
      loaded++; setFetchStatus(`Cargando... ${loaded}/${total}`);
      setLoading(l => ({ ...l, [ticker]: false }));
    }));
    const infoUpdates = {};
    await Promise.all(watchlist.map(async (w) => {
      if (!companyInfo[w.ticker]) { const info = await fetchInfo(w.ticker); if (info) infoUpdates[w.ticker] = info; }
    }));
    if (Object.keys(infoUpdates).length > 0) setCompanyInfo(prev => ({ ...prev, ...infoUpdates }));
    positions.forEach(p => {
      if (p.currency !== "USD") return;
      const pd = updates[p.ticker];
      if (!pd?.price) return;
      const pnlPct = (pd.price - p.avgPrice) / p.avgPrice;
      const sl = STOP_LOSS[p.type] || 0.08;
      if (pnlPct <= -sl) newAlerts.push({ ticker: p.ticker, type: "STOP LOSS", value: pnlPct * 100, label: `${p.type.toUpperCase()} — SL -${sl * 100}%` });
    });
    setPriceData(prev => ({ ...prev, ...updates }));
    setAlerts(newAlerts);
    setLastUpdate(new Date());
    const errors = Object.values(updates).filter(u => u.error).length;
    setFetchStatus(errors > 0 ? `${errors} sin datos` : "");
  }, [positions, watchlist, companyInfo]);

  useEffect(() => { fetchAll(); }, []);

  const usdPositions = positions.filter(p => p.currency === "USD");
  const clpPositions = positions.filter(p => p.currency === "CLP");
  const totalUSDCurrent = usdPositions.reduce((acc, p) => { const pd = priceData[p.ticker]; return acc + (pd?.price ? pd.price * p.qty : p.avgPrice * p.qty); }, 0);
  const totalUSDCost = usdPositions.reduce((acc, p) => acc + p.avgPrice * p.qty, 0);
  const totalUSDUnrealized = totalUSDCurrent - totalUSDCost;
  const totalUSDUnrealizedPct = totalUSDCost ? (totalUSDUnrealized / totalUSDCost) * 100 : 0;
  const totalCLPCurrent = clpPositions.reduce((acc, p) => { const mp = manualPrices[p.ticker]; return acc + (mp ? mp * p.qty : p.avgPrice * p.qty); }, 0);
  const totalCLPCost = clpPositions.reduce((acc, p) => acc + p.avgPrice * p.qty, 0);
  const totalCLPUnrealized = totalCLPCurrent - totalCLPCost;
  const totalCLPUnrealizedPct = totalCLPCost ? (totalCLPUnrealized / totalCLPCost) * 100 : 0;
  const totalRealizedUSD = transactions.filter(t => t.action === "SELL" && t.realizedPnL != null && t.currency === "USD").reduce((acc, t) => acc + t.realizedPnL, 0);
  const totalRealizedCLP = transactions.filter(t => t.action === "SELL" && t.realizedPnL != null && t.currency === "CLP").reduce((acc, t) => acc + t.realizedPnL, 0);

  // Filtered + sorted watchlist
  const filteredWatchlist = useMemo(() => {
    let list = watchlist.filter(w => {
      if (!watchSearch) return true;
      const q = watchSearch.toLowerCase();
      const info = companyInfo[w.ticker];
      return w.ticker.toLowerCase().includes(q) || (info?.name || "").toLowerCase().includes(q);
    });
    list = [...list].sort((a, b) => {
      const pdA = priceData[a.ticker];
      const pdB = priceData[b.ticker];
      let va, vb;
      if (watchSort === "ticker") { va = a.ticker; vb = b.ticker; return watchSortDir * va.localeCompare(vb); }
      if (watchSort === "price") { va = pdA?.price ?? -Infinity; vb = pdB?.price ?? -Infinity; }
      if (watchSort === "rsiD") { va = pdA?.rsiD ?? -Infinity; vb = pdB?.rsiD ?? -Infinity; }
      if (watchSort === "dayChange") { va = pdA?.dayChange ?? -Infinity; vb = pdB?.dayChange ?? -Infinity; }
      if (watchSort === "type") { va = a.type; vb = b.type; return watchSortDir * va.localeCompare(vb); }
      return watchSortDir * (va - vb);
    });
    return list;
  }, [watchlist, watchSearch, watchSort, watchSortDir, priceData, companyInfo]);

  const toggleSort = (field) => {
    if (watchSort === field) setWatchSortDir(d => d * -1);
    else { setWatchSort(field); setWatchSortDir(1); }
  };

  const saveNote = (note) => {
    if (!noteModal) return;
    if (noteModal.type === "position") setPositions(ps => ps.map(p => p.id === noteModal.id ? { ...p, nota: note } : p));
    else setWatchlist(ws => ws.map(w => w.id === noteModal.id ? { ...w, nota: note } : w));
    setNoteModal(null);
  };

  const exportJSON = () => {
    const data = { exportedAt: new Date().toISOString(), positions, watchlist, transactions, manualPrices, companyInfo };
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `portfolio_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
  const copyExport = () => { navigator.clipboard.writeText(exportText).catch(() => {}); setCopyLabel("✓ COPIADO"); setTimeout(() => setCopyLabel("📋 COPIAR"), 2000); };
  const importJSON = () => {
    setImportError("");
    try {
      const data = JSON.parse(importText);
      if (!data.positions) throw new Error("JSON inválido");
      setPositions(data.positions);
      if (data.watchlist) setWatchlist(data.watchlist);
      if (data.transactions) setTransactions(data.transactions);
      if (data.manualPrices) setManualPrices(data.manualPrices);
      if (data.companyInfo) setCompanyInfo(data.companyInfo);
      setImportSuccess(true); setImportText("");
      setTimeout(() => { setShowImportModal(false); setImportSuccess(false); }, 1500);
    } catch (e) { setImportError(e.message || "JSON inválido"); }
  };

  const addPosition = () => {
    if (!newPos.ticker || !newPos.qty || !newPos.avgPrice) return;
    const pos = { ...newPos, id: Date.now(), qty: +newPos.qty, avgPrice: +newPos.avgPrice, status: "active", nota: newPos.nota || "" };
    setPositions(p => [...p, pos]);
    setTransactions(t => [{ id: Date.now() + 1, ticker: pos.ticker, date: new Date().toISOString().split("T")[0], action: "BUY", qty: pos.qty, price: pos.avgPrice, currency: pos.currency, realizedPnL: null }, ...t]);
    setNewPos({ ticker: "", company: "", type: "largo", qty: "", avgPrice: "", currency: "USD", broker: "IBKR", tesis: "", nota: "" });
    setShowAddPos(false);
  };
  const handleRemovePosition = (pos) => {
    setSellPos(pos); const mp = manualPrices[pos.ticker]; const pd = priceData[pos.ticker];
    setSellPrice(pos.currency === "CLP" ? (mp ? String(mp) : "") : (pd?.price ? String(pd.price.toFixed(2)) : ""));
    setShowSellModal(true);
  };
  const confirmSell = () => {
    if (!sellPos || !sellPrice) return;
    const price = parseFloat(sellPrice); if (isNaN(price)) return;
    const realizedPnL = (price - sellPos.avgPrice) * sellPos.qty;
    setTransactions(t => [{ id: Date.now(), ticker: sellPos.ticker, date: new Date().toISOString().split("T")[0], action: "SELL", qty: sellPos.qty, price, currency: sellPos.currency, realizedPnL }, ...t]);
    setPositions(p => p.filter(x => x.id !== sellPos.id));
    setShowSellModal(false); setSellPos(null); setSellPrice("");
  };
  const addWatchlist = () => {
    if (!newWatch.ticker) return;
    setWatchlist(w => [...w, { ...newWatch, id: Date.now(), ticker: newWatch.ticker.toUpperCase(), nota: newWatch.nota || "" }]);
    setNewWatch({ ticker: "", type: "observación", tesis: "", nota: "" }); setShowAddWatch(false);
  };
  const removeWatch = (id) => setWatchlist(w => w.filter(x => x.id !== id));
  const addTransaction = () => {
    if (!newTx.ticker || !newTx.qty || !newTx.price) return;
    setTransactions(t => [{ ...newTx, id: Date.now(), qty: +newTx.qty, price: +newTx.price, realizedPnL: null }, ...t]);
    setNewTx({ ticker: "", date: new Date().toISOString().split("T")[0], qty: "", price: "", action: "BUY", currency: "USD" }); setShowAddTx(false);
  };
  const deleteTransaction = (id) => setTransactions(t => t.filter(x => x.id !== id));
  const saveEditTx = (updated) => { setTransactions(t => t.map(x => x.id === updated.id ? updated : x)); setEditTxModal(null); };

  const typeColor = (t) => t === "largo" ? "#5b9cf6" : t === "swing" ? "#f0c040" : "#8899aa";

  const s = {
    app: { fontFamily: ff, background: "#080d14", color: "#c8d6e5", minHeight: "100vh", paddingBottom: 60 },
    header: { background: "#0c1220", borderBottom: "1px solid #1e2d40", padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 },
    tabs: { display: "flex", background: "#0c1220", borderBottom: "1px solid #1e2d40", padding: "0 20px" },
    tab: (a) => ({ padding: "11px 16px", cursor: "pointer", fontSize: 10, letterSpacing: 2, fontWeight: 700, color: a ? "#00e5a0" : "#445", borderBottom: a ? "2px solid #00e5a0" : "2px solid transparent", background: "none", border: "none", fontFamily: ff }),
    card: (accent) => ({ background: "#0c1624", border: `1px solid ${accent || "#1a2535"}`, borderRadius: 8, padding: 18, marginBottom: 14 }),
    label: { fontSize: 10, letterSpacing: 2, color: "#445", marginBottom: 4 },
    val: (c) => ({ fontSize: 20, fontWeight: 700, color: c || "#c8d6e5" }),
    table: { width: "100%", borderCollapse: "collapse", fontSize: 12 },
    th: { textAlign: "left", padding: "8px 10px", color: "#334", fontSize: 10, letterSpacing: 2, borderBottom: "1px solid #1a2535" },
    td: { padding: "10px 10px", borderBottom: "1px solid #111820", verticalAlign: "middle" },
    badge: (c) => ({ display: "inline-block", padding: "2px 7px", borderRadius: 3, fontSize: 10, fontWeight: 700, letterSpacing: 1, background: c + "22", color: c, border: `1px solid ${c}44` }),
    btn: (c = "#00e5a0") => ({ background: c + "18", color: c, border: `1px solid ${c}44`, borderRadius: 4, padding: "6px 12px", cursor: "pointer", fontSize: 11, fontFamily: ff, fontWeight: 700, letterSpacing: 1 }),
    filterBtn: (active, c) => ({ padding: "5px 14px", cursor: "pointer", fontSize: 10, letterSpacing: 2, fontWeight: 700, fontFamily: ff, borderRadius: 4, border: `1px solid ${active ? c + "88" : "#1e2d40"}`, background: active ? c + "18" : "transparent", color: active ? c : "#445" }),
    input: { background: "#060b10", border: "1px solid #1e2d40", borderRadius: 4, color: "#c8d6e5", padding: "8px 12px", fontSize: 12, fontFamily: ff, width: "100%", boxSizing: "border-box" },
    modal: { position: "fixed", inset: 0, background: "#000c", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 },
    mbox: { background: "#0c1624", border: "1px solid #1e2d40", borderRadius: 10, padding: 24, width: 460, maxWidth: "95vw", maxHeight: "90vh", overflowY: "auto" },
    alertRow: (c) => ({ background: c + "18", border: `1px solid ${c}44`, borderRadius: 6, padding: "9px 14px", marginBottom: 7, display: "flex", alignItems: "center", justifyContent: "space-between" }),
    sectionHeader: (c) => ({ fontSize: 11, letterSpacing: 3, color: c, marginBottom: 10, marginTop: 16, paddingBottom: 6, borderBottom: `1px solid ${c}33`, display: "flex", alignItems: "center", gap: 10 }),
  };

  const renderPositionTable = (posList, isCLP) => (
    <div style={{ overflowX: "auto", marginBottom: 20 }}>
      <table style={s.table}>
        <thead>
          <tr>{["TICKER","TIPO","QTY","PROM","PRECIO","VALOR","PESO%","P&L","P&L%",...(!isCLP?["DIST SL","RSI D","RSI W"]:[]),"NOTA",""].map((h,i)=><th key={i} style={s.th}>{h}</th>)}</tr>
        </thead>
        <tbody>
          {posList.map(pos => {
            const pd = priceData[pos.ticker];
            const manualPrice = manualPrices[pos.ticker];
            const price = isCLP ? manualPrice : pd?.price;
            const totalCurrent = price ? price * pos.qty : null;
            const cost = pos.avgPrice * pos.qty;
            const pnl = totalCurrent != null ? totalCurrent - cost : null;
            const pnlPct = pnl != null ? (pnl / cost) * 100 : null;
            const sl = STOP_LOSS[pos.type] || 0.08;
            const distToSL = pnlPct != null ? (pnlPct - (-sl * 100)) : null;
            const nearSL = distToSL != null && distToSL < sl * 100 * 0.3;
            const totalPool = isCLP ? totalCLPCurrent : totalUSDCurrent;
            const peso = totalCurrent != null && totalPool > 0 ? (totalCurrent / totalPool) * 100 : null;
            const hasNote = pos.nota && pos.nota.trim().length > 0;
            return (
              <tr key={pos.id} style={{ opacity: pos.status === "salida" ? 0.6 : 1, background: nearSL ? "#ff4d6d07" : "transparent" }}>
                <td style={s.td}>
                  {isCLP ? <span style={{ fontWeight: 700, color: "#e0ecf8" }}>{pos.ticker}</span>
                    : <span className="tv-link" style={{ fontWeight: 700, color: "#e0ecf8" }} onClick={() => openTV(pos.ticker)}>{pos.ticker} ↗</span>}
                  <div style={{ fontSize: 9, color: "#445" }}>{pos.company}</div>
                  {pos.status === "salida" && <div style={{ fontSize: 9, color: "#ff4d6d" }}>EN SALIDA</div>}
                </td>
                <td style={s.td}><span style={s.badge(typeColor(pos.type))}>{pos.type.toUpperCase()}</span></td>
                <td style={s.td}>{fmt(pos.qty, pos.qty % 1 === 0 ? 0 : 3)}</td>
                <td style={s.td}>{isCLP ? fmtCLP(pos.avgPrice) : `$${fmt(pos.avgPrice)}`} <span style={{ fontSize: 9, color: "#445" }}>{pos.currency}</span></td>
                <td style={s.td}>
                  {isCLP ? (editingTicker === pos.ticker ? (
                    <input autoFocus type="number" value={editVal}
                      onChange={e => setEditVal(e.target.value)}
                      onBlur={() => { const v = parseFloat(editVal); if (!isNaN(v)) setManualPrices(mp => ({ ...mp, [pos.ticker]: v })); setEditingTicker(null); }}
                      onKeyDown={e => { if (e.key === "Enter") { const v = parseFloat(editVal); if (!isNaN(v)) setManualPrices(mp => ({ ...mp, [pos.ticker]: v })); setEditingTicker(null); } if (e.key === "Escape") setEditingTicker(null); }}
                      style={{ ...s.input, width: 110, padding: "3px 6px", fontSize: 11 }} />
                  ) : (
                    <span className="price-editable" style={{ color: manualPrice ? "#c8d6e5" : "#445", fontSize: 12 }}
                      onClick={() => { setEditingTicker(pos.ticker); setEditVal(manualPrice ? String(manualPrice) : ""); }}>
                      {manualPrice ? fmtCLP(manualPrice) : "click p/ ingresar"}
                    </span>
                  )) : (loading[pos.ticker] ? <span style={{ color: "#334" }}>…</span> : price ? `$${fmt(price)}` : pd?.error ? <span style={{ fontSize: 9, color: "#ff4d6d" }}>ERR</span> : "—")}
                </td>
                <td style={s.td}>
                  {totalCurrent != null ? (
                    <div>
                      <div>{isCLP ? fmtCLP(totalCurrent) : `$${fmt(totalCurrent)}`}</div>
                      <div style={{ fontSize: 9, color: isCLP ? "#f0c040" : "#5b9cf6" }}>{isCLP ? "CLP" : "USD"}</div>
                    </div>
                  ) : "—"}
                </td>
                <td style={s.td}><span style={{ color: "#8899aa" }}>{peso != null ? `${fmt(peso, 1)}%` : "—"}</span></td>
                <td style={s.td}>
                  <span style={{ color: clr(pnl) }}>{pnl != null ? `${pnl >= 0 ? "+" : ""}${isCLP ? fmtCLP(pnl) : `$${fmt(pnl)}`}` : "—"}</span>
                  {pnl != null && <div style={{ fontSize: 9, color: isCLP ? "#f0c040" : "#5b9cf6" }}>{isCLP ? "CLP" : "USD"}</div>}
                </td>
                <td style={s.td}><span style={{ color: clr(pnlPct) }}>{fmtPct(pnlPct)}</span></td>
                {!isCLP && <td style={s.td}>{distToSL != null ? <span style={{ color: distToSL < 3 ? "#ff4d6d" : distToSL < 8 ? "#f0c040" : "#556", fontSize: 11, fontWeight: distToSL < 3 ? 700 : 400 }}>{distToSL > 0 ? `${fmt(distToSL, 1)}%` : "⚠ SL"}</span> : "—"}</td>}
                {!isCLP && <td style={s.td}><RSIBar value={pd?.rsiD} /></td>}
                {!isCLP && <td style={s.td}><RSIBar value={pd?.rsiW} /></td>}
                <td style={s.td}><button onClick={() => setNoteModal({ ticker: pos.ticker, type: "position", id: pos.id, note: pos.nota || "" })} style={{ ...s.btn(hasNote ? "#f0c040" : "#445"), padding: "2px 7px", fontSize: 10 }}>{hasNote ? "📝" : "＋"}</button></td>
                <td style={s.td}><button style={{ ...s.btn("#ff4d6d"), padding: "2px 7px" }} onClick={() => handleRemovePosition(pos)}>✕</button></td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );

  const showUSD = marketFilter === "ambos" || marketFilter === "usd";
  const showCLP = marketFilter === "ambos" || marketFilter === "clp";

  const SortBtn = ({ field, label }) => (
    <button className={`sort-btn${watchSort === field ? " active" : ""}`} onClick={() => toggleSort(field)}>
      {label} {watchSort === field ? (watchSortDir === 1 ? "↑" : "↓") : ""}
    </button>
  );

  return (
    <div style={s.app}>
      {/* Header */}
      <div style={s.header}>
        <div>
          <div style={{ fontSize: 16, fontWeight: 700, letterSpacing: 3, color: "#00e5a0" }}>◈ PORTFOLIO TRACKER</div>
          <div style={{ fontSize: 10, color: "#445", letterSpacing: 2 }}>
            <span style={{ color: "#5b9cf6" }}>NYSE</span> · BOLSA DE NEW YORK
            <span style={{ margin: "0 8px", color: "#223" }}>|</span>
            <span style={{ color: "#f0c040" }}>BSC</span> · BOLSA DE SANTIAGO
            {usdClp && <span style={{ marginLeft: 12, color: "#334" }}>· USD/CLP {fmt(usdClp, 0)}</span>}
          </div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ display: "flex", gap: 20, justifyContent: "flex-end", marginBottom: 6, flexWrap: "wrap" }}>
            <div>
              <div style={{ fontSize: 9, color: "#5b9cf6", letterSpacing: 1 }}>NYSE · NO REALIZADO</div>
              <div style={{ color: clr(totalUSDUnrealized), fontSize: 15, fontWeight: 700 }}>{totalUSDUnrealized >= 0 ? "+" : ""}${fmt(totalUSDUnrealized)} <span style={{ fontSize: 10 }}>({fmtPct(totalUSDUnrealizedPct)})</span></div>
            </div>
            <div>
              <div style={{ fontSize: 9, color: "#f0c040", letterSpacing: 1 }}>BSC · NO REALIZADO</div>
              <div style={{ color: clr(totalCLPUnrealized), fontSize: 15, fontWeight: 700 }}>{totalCLPUnrealized >= 0 ? "+" : ""}{fmtCLP(totalCLPUnrealized)} <span style={{ fontSize: 10 }}>({fmtPct(totalCLPUnrealizedPct)})</span></div>

              <div style={{ fontSize: 9, color: "#00e5a0", letterSpacing: 1 }}>REALIZADO</div>

              <div style={{ color: clr(totalRealizedCLP), fontSize: 12, fontWeight: 700 }}>BSC {totalRealizedCLP >= 0 ? "+" : ""}{fmtCLP(totalRealizedCLP)}</div>

          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "flex-end" }}>
            <span style={{ fontSize: 10, color: "#334", alignSelf: "center" }}>{fetchStatus || (lastUpdate ? lastUpdate.toLocaleTimeString() : "—")}</span>
            <button onClick={fetchAll} style={{ ...s.btn(), padding: "4px 9px", fontSize: 10 }}>↺ REF</button>
            <button onClick={() => { setShowImportModal(true); setImportText(""); setImportError(""); }} style={{ ...s.btn("#a78bfa"), padding: "4px 9px", fontSize: 10 }}>⬆ IMPORT</button>
            <button onClick={exportJSON} style={{ ...s.btn("#f0c040"), padding: "4px 9px", fontSize: 10 }}>⬇ EXPORT</button>
          </div>
        </div>
      </div>

      {/* Alerts */}
      {alerts.length > 0 && (
        <div style={{ padding: "10px 20px 0" }}>
          {alerts.map((a, i) => (
            <div key={i} style={s.alertRow("#ff4d6d")}>
              <span style={{ color: "#ff4d6d", fontWeight: 700, fontSize: 11 }}>⚠ STOP LOSS — {a.ticker}</span>
              <span style={{ color: "#8899aa", fontSize: 10 }}>{a.label} · {fmtPct(a.value)}</span>
            </div>
          ))}
        </div>
      )}

      {/* Tabs */}
      <div style={s.tabs}>
        {["portfolio", "watchlist", "transacciones"].map(t => (
          <button key={t} style={s.tab(tab === t)} onClick={() => setTab(t)}>{t.toUpperCase()}</button>
        ))}
      </div>

      <div style={{ padding: "18px 20px" }}>

        {/* ── PORTFOLIO ── */}
        {tab === "portfolio" && (<>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 6 }}>
            {[
              { label: "VALOR NYSE", val: `$${fmt(totalUSDCurrent)} USD`, c: "#5b9cf6" },
              { label: "P&L NYSE", val: `${totalUSDUnrealized >= 0 ? "+" : ""}$${fmt(totalUSDUnrealized)} USD`, c: clr(totalUSDUnrealized) },
              { label: "P&L NYSE %", val: fmtPct(totalUSDUnrealizedPct), c: clr(totalUSDUnrealizedPct) },
              { label: "REALIZADO NYSE", val: `${totalRealizedUSD >= 0 ? "+" : ""}$${fmt(totalRealizedUSD)} USD`, c: clr(totalRealizedUSD) },
            ].map(item => (
              <div key={item.label} style={s.card("#5b9cf622")}>
                <div style={s.label}>{item.label}</div>
                <div style={s.val(item.c)}>{item.val}</div>
              </div>
            ))}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 16 }}>
            {[
              { label: "VALOR BSC", val: `${fmtCLP(totalCLPCurrent)} CLP`, c: "#f0c040" },
              { label: "P&L BSC", val: `${totalCLPUnrealized >= 0 ? "+" : ""}${fmtCLP(totalCLPUnrealized)} CLP`, c: clr(totalCLPUnrealized) },
              { label: "P&L BSC %", val: fmtPct(totalCLPUnrealizedPct), c: clr(totalCLPUnrealizedPct) },
              { label: "REALIZADO BSC", val: `${totalRealizedCLP >= 0 ? "+" : ""}${fmtCLP(totalRealizedCLP)} CLP`, c: clr(totalRealizedCLP) },
            ].map(item => (
              <div key={item.label} style={s.card("#f0c04011")}>
                <div style={s.label}>{item.label}</div>
                <div style={s.val(item.c)}>{item.val}</div>
              </div>
            ))}
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <div style={{ display: "flex", gap: 6 }}>
              <button style={s.filterBtn(marketFilter === "ambos", "#00e5a0")} onClick={() => setMarketFilter("ambos")}>AMBOS</button>
              <button style={s.filterBtn(marketFilter === "usd", "#5b9cf6")} onClick={() => setMarketFilter("usd")}>NYSE</button>
              <button style={s.filterBtn(marketFilter === "clp", "#f0c040")} onClick={() => setMarketFilter("clp")}>BSC</button>
            </div>
            <button style={s.btn()} onClick={() => setShowAddPos(true)}>+ AGREGAR</button>
          </div>

          {showUSD && usdPositions.length > 0 && (<>
            <div style={s.sectionHeader("#5b9cf6")}><span>● NYSE — BOLSA DE NEW YORK</span><span style={{ fontSize: 10, color: "#334", fontWeight: 400 }}>click en ticker → TradingView</span></div>
            {renderPositionTable(usdPositions, false)}
          </>)}
          {showCLP && clpPositions.length > 0 && (<>
            <div style={s.sectionHeader("#f0c040")}><span>● BSC — BOLSA DE SANTIAGO</span><span style={{ fontSize: 10, color: "#334", fontWeight: 400 }}>click en precio → ingresar manualmente</span></div>
            {renderPositionTable(clpPositions, true)}
          </>)}
        </>)}

        {/* ── WATCHLIST ── */}
        {tab === "watchlist" && (<>
          {/* Toolbar */}
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12, flexWrap: "wrap" }}>
            <input className="search-input" placeholder="🔍 Buscar ticker o empresa..." value={watchSearch} onChange={e => setWatchSearch(e.target.value)} />
            <div style={{ display: "flex", gap: 5, flexWrap: "wrap", alignItems: "center" }}>
              <span style={{ fontSize: 10, color: "#334", letterSpacing: 1 }}>ORDENAR:</span>
              <SortBtn field="ticker" label="A-Z" />
              <SortBtn field="price" label="PRECIO" />
              <SortBtn field="rsiD" label="RSI" />
              <SortBtn field="dayChange" label="DÍA %" />
              <SortBtn field="type" label="TIPO" />
            </div>
            <div style={{ marginLeft: "auto" }}>
              <button style={s.btn()} onClick={() => setShowAddWatch(true)}>+ AGREGAR</button>
            </div>
          </div>
          <div style={{ fontSize: 10, color: "#334", marginBottom: 10 }}>
            {filteredWatchlist.length} de {watchlist.length} tickers · click → TradingView
          </div>

          {filteredWatchlist.length === 0 && <div style={{ color: "#334", padding: 24, textAlign: "center", fontSize: 12 }}>Sin resultados.</div>}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(200px,1fr))", gap: 8 }}>
            {filteredWatchlist.map(w => {
              const pd = priceData[w.ticker];
              const info = companyInfo[w.ticker];
              const hasNote = w.nota && w.nota.trim().length > 0;
              const pe = info?.pe;
              return (
                <div key={w.id} className="wcard" style={{ background: "#0c1624", border: "1px solid #1a2535", borderRadius: 7, padding: "10px 12px", position: "relative", cursor: "pointer" }}
                  onClick={() => openTV(w.ticker)}>
                  <div style={{ position: "absolute", top: 7, right: 7, display: "flex", gap: 3 }}>
                    <button style={{ ...s.btn(hasNote ? "#f0c040" : "#334"), padding: "1px 4px", fontSize: 9, zIndex: 2 }}
                      onClick={e => { e.stopPropagation(); setNoteModal({ ticker: w.ticker, type: "watchlist", id: w.id, note: w.nota || "" }); }}>📝</button>
                    <button style={{ ...s.btn("#ff4d6d"), padding: "1px 4px", fontSize: 9, zIndex: 2 }}
                      onClick={e => { e.stopPropagation(); removeWatch(w.id); }}>✕</button>
                  </div>

                  <div style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 1, paddingRight: 48 }}>
                    <span style={{ fontWeight: 700, fontSize: 13, color: "#e0ecf8" }}>{w.ticker}</span>
                  </div>
                  {/* Type selector dropdown */}
                  <div style={{ marginBottom: 4 }} onClick={e => e.stopPropagation()}>
                    <select
                      value={w.type}
                      onChange={e => setWatchlist(ws => ws.map(x => x.id === w.id ? { ...x, type: e.target.value } : x))}
                      style={{ background: typeColor(w.type) + "22", border: `1px solid ${typeColor(w.type)}44`, borderRadius: 3, color: typeColor(w.type), fontSize: 9, fontFamily: ff, fontWeight: 700, letterSpacing: 1, padding: "2px 5px", cursor: "pointer" }}>
                      <option value="observación">OBSERVACIÓN</option>
                      <option value="swing">SWING</option>
                      <option value="largo">LARGO</option>
                    </select>
                  </div>
                  {info?.name && <div style={{ fontSize: 10, color: "#6a8aaa", marginBottom: 1, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{info.name}</div>}
                  {(info?.sector || info?.industry) && <div style={{ fontSize: 9, color: "#445", marginBottom: 6, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{info.sector}{info.sector && info.industry ? " · " : ""}{info.industry}</div>}

                  <div style={{ display: "flex", alignItems: "baseline", gap: 6, marginBottom: 6 }}>
                    <span style={{ fontSize: 16, fontWeight: 700, color: "#c8d6e5" }}>
                      {loading[w.ticker] ? <span style={{ color: "#334", fontSize: 10 }}>…</span> : pd?.error ? <span style={{ color: "#ff4d6d", fontSize: 9 }}>sin datos</span> : pd?.price ? `$${fmt(pd.price)}` : "—"}
                    </span>
                    {pd?.dayChange != null && <span style={{ fontSize: 11, fontWeight: 700, color: clr(pd.dayChange) }}>{pd.dayChange >= 0 ? "+" : ""}{fmt(pd.dayChange, 2)}%</span>}
                  </div>

                  <div style={{ display: "flex", gap: 10 }}>
                    {pe != null && <div><div style={{ fontSize: 8, color: "#445", letterSpacing: 1 }}>P/E</div><div style={{ fontSize: 11, fontWeight: 700, color: pe > 40 ? "#f0c040" : pe > 0 ? "#00e5a0" : "#ff4d6d" }}>{fmt(pe, 1)}x</div></div>}
                    {pd?.rsiD != null && <div><div style={{ fontSize: 8, color: "#445", letterSpacing: 1 }}>RSI D</div><div style={{ fontSize: 11, fontWeight: 700, color: pd.rsiD < 35 ? "#00e5a0" : pd.rsiD > 65 ? "#ff4d6d" : "#f0c040" }}>{fmt(pd.rsiD, 1)}</div></div>}

                  {hasNote && <div style={{ fontSize: 11, color: "#f0c040bb", marginTop: 4, lineHeight: 1.4 }}>📝 {w.nota}</div>}
                  <div style={{ fontSize: 8, color: "#223", marginTop: 5, textAlign: "right" }}>↗ TV</div>

            <button style={s.btn()} onClick={() => setShowAddTx(true)}>+ REGISTRAR</button>
          </div>
          {transactions.length === 0 && <div style={{ color: "#334", padding: 24, textAlign: "center", fontSize: 12 }}>Sin transacciones.</div>}
          <table style={s.table}>
            <thead><tr>{["FECHA","ACCIÓN","TICKER","QTY","PRECIO","TOTAL","P&L REALIZADO","BOLSA",""].map(h => <th key={h} style={s.th}>{h}</th>)}</tr></thead>
            <tbody>

                <tr key={tx.id}>
                  <td style={s.td}>{tx.date}</td>
                  <td style={s.td}><span style={s.badge(tx.action === "BUY" ? "#00e5a0" : "#ff4d6d")}>{tx.action}</span></td>
                  <td style={{ ...s.td, fontWeight: 700, color: "#e0ecf8" }}>{tx.ticker}</td>
                  <td style={s.td}>{fmt(tx.qty, 3)}</td>
                  <td style={s.td}>{tx.currency === "CLP" ? fmtCLP(tx.price) : `$${fmt(tx.price)}`}</td>
                  <td style={s.td}>{tx.currency === "CLP" ? fmtCLP(tx.qty * tx.price) : `$${fmt(tx.qty * tx.price)}`}</td>
                  <td style={s.td}>{tx.realizedPnL != null ? <span style={{ color: clr(tx.realizedPnL), fontWeight: 700 }}>{tx.realizedPnL >= 0 ? "+" : ""}{tx.currency === "CLP" ? fmtCLP(tx.realizedPnL) : `$${fmt(tx.realizedPnL)}`}</span> : <span style={{ color: "#334" }}>—</span>}</td>
                  <td style={s.td}><span style={{ color: tx.currency === "USD" ? "#5b9cf6" : "#f0c040", fontSize: 10, fontWeight: 700 }}>{tx.currency === "USD" ? "NYSE" : "BSC"}</span></td>
                  <td style={s.td}><div style={{ display: "flex", gap: 4 }}><button style={{ ...s.btn("#5b9cf6"), padding: "2px 6px", fontSize: 10 }} onClick={() => setEditTxModal(tx)}>✏️</button><button style={{ ...s.btn("#ff4d6d"), padding: "2px 6px", fontSize: 10 }} onClick={() => deleteTransaction(tx.id)}>✕</button></div></td>
                </tr>
              ))}
            </tbody>
          </table>
        </>)}
      </div>

      {noteModal && <NoteModal ticker={noteModal.ticker} initialNote={noteModal.note} onSave={saveNote} onClose={() => setNoteModal(null)} />}
      {editTxModal && <EditTxModal tx={editTxModal} onSave={saveEditTx} onClose={() => setEditTxModal(null)} />}

      {/* SELL MODAL */}
      {showSellModal && sellPos && (
        <div style={s.modal} onClick={() => setShowSellModal(false)}>
          <div style={s.mbox} onClick={e => e.stopPropagation()}>
            <div style={{ fontWeight: 700, marginBottom: 14, letterSpacing: 2, color: "#ff4d6d" }}>CERRAR POSICIÓN — {sellPos.ticker}</div>
            <div style={{ fontSize: 11, color: "#556", marginBottom: 16, lineHeight: 1.8 }}>
              <div>Cantidad: <span style={{ color: "#c8d6e5" }}>{fmt(sellPos.qty, 3)}</span></div>
              <div>Precio promedio: <span style={{ color: "#c8d6e5" }}>{sellPos.currency === "CLP" ? fmtCLP(sellPos.avgPrice) : `$${fmt(sellPos.avgPrice)}`} {sellPos.currency}</span></div>
              <div>Costo total: <span style={{ color: "#c8d6e5" }}>{sellPos.currency === "CLP" ? fmtCLP(sellPos.avgPrice * sellPos.qty) : `$${fmt(sellPos.avgPrice * sellPos.qty)}`} {sellPos.currency}</span></div>
            </div>
            <div style={{ marginBottom: 14 }}>
              <div style={s.label}>PRECIO DE VENTA ({sellPos.currency})</div>
              <input style={s.input} value={sellPrice} type="number" placeholder="0.00" onChange={e => setSellPrice(e.target.value)} autoFocus />
              {sellPrice && !isNaN(parseFloat(sellPrice)) && (
                <div style={{ marginTop: 8, fontSize: 12 }}>
                  <span style={{ color: "#445" }}>P&L estimado: </span>
                  <span style={{ color: clr((parseFloat(sellPrice) - sellPos.avgPrice) * sellPos.qty), fontWeight: 700 }}>
                    {(parseFloat(sellPrice) - sellPos.avgPrice) * sellPos.qty >= 0 ? "+" : ""}
                    {sellPos.currency === "CLP" ? fmtCLP((parseFloat(sellPrice) - sellPos.avgPrice) * sellPos.qty) : `$${fmt((parseFloat(sellPrice) - sellPos.avgPrice) * sellPos.qty)}`} {sellPos.currency}
                  </span>
                </div>
              )}
            </div>
            <div style={{ display: "flex", gap: 9 }}>
              <button style={{ ...s.btn("#ff4d6d"), flex: 1, padding: "10px" }} onClick={confirmSell}>CONFIRMAR VENTA</button>
              <button style={{ ...s.btn("#445"), flex: 1, padding: "10px" }} onClick={() => setShowSellModal(false)}>CANCELAR</button>
            </div>
          </div>
        </div>
      )}

      {/* IMPORT */}
      {showImportModal && (
        <div style={s.modal} onClick={() => setShowImportModal(false)}>
          <div style={{ ...s.mbox, width: 500 }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <span style={{ fontWeight: 700, letterSpacing: 2, color: "#a78bfa", fontSize: 12 }}>⬆ IMPORTAR JSON</span>
              <button style={{ ...s.btn("#445"), padding: "4px 10px" }} onClick={() => setShowImportModal(false)}>✕</button>
            </div>
            <textarea value={importText} onChange={e => { setImportText(e.target.value); setImportError(""); }}
              placeholder='{ "positions": [...], "watchlist": [...] }'
              style={{ width: "100%", height: 240, background: "#060b10", border: `1px solid ${importError ? "#ff4d6d" : "#1e2d40"}`, borderRadius: 6, color: "#c8d6e5", fontSize: 10, fontFamily: ff, padding: 12, boxSizing: "border-box", resize: "none", lineHeight: 1.6 }} />
            {importError && <div style={{ color: "#ff4d6d", fontSize: 11, marginTop: 6 }}>⚠ {importError}</div>}
            {importSuccess && <div style={{ color: "#00e5a0", fontSize: 11, marginTop: 6 }}>✓ Importado correctamente</div>}
            <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
              <button style={{ ...s.btn("#a78bfa"), flex: 1, padding: "9px" }} onClick={importJSON}>IMPORTAR</button>
              <button style={{ ...s.btn("#445"), flex: 1, padding: "9px" }} onClick={() => setShowImportModal(false)}>CANCELAR</button>
            </div>
          </div>
        </div>
      )}

      {/* EXPORT */}
      {showExportModal && (
        <div style={s.modal} onClick={() => setShowExportModal(false)}>
          <div style={{ ...s.mbox, width: 500 }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <span style={{ fontWeight: 700, letterSpacing: 2, color: "#f0c040", fontSize: 12 }}>⬇ EXPORT JSON</span>
              <button style={{ ...s.btn("#445"), padding: "4px 10px" }} onClick={() => setShowExportModal(false)}>✕</button>
            </div>
            <textarea readOnly value={exportText} onFocus={e => e.target.select()} onClick={e => e.target.select()}
              style={{ width: "100%", height: 260, background: "#060b10", border: "1px solid #1e2d40", borderRadius: 6, color: "#6a9ab8", fontSize: 10, fontFamily: ff, padding: 12, boxSizing: "border-box", resize: "none", lineHeight: 1.6 }} />
            <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
              <button style={{ ...s.btn("#f0c040"), flex: 1, padding: "9px" }} onClick={copyExport}>{copyLabel}</button>
              <button style={{ ...s.btn("#445"), flex: 1, padding: "9px" }} onClick={() => setShowExportModal(false)}>CERRAR</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD POSITION */}
      {showAddPos && (
        <div style={s.modal} onClick={() => setShowAddPos(false)}>
          <div style={s.mbox} onClick={e => e.stopPropagation()}>
            <div style={{ fontWeight: 700, marginBottom: 14, letterSpacing: 2, color: "#00e5a0" }}>+ NUEVA POSICIÓN</div>
            {[{ label: "TICKER", key: "ticker", ph: "AAPL" }, { label: "EMPRESA", key: "company", ph: "Apple Inc." }, { label: "CANTIDAD", key: "qty", ph: "100", type: "number" }, { label: "PRECIO PROMEDIO", key: "avgPrice", ph: "150.00", type: "number" }, { label: "BROKER", key: "broker", ph: "IBKR" }, { label: "TESIS", key: "tesis", ph: "Razón..." }, { label: "NOTA", key: "nota", ph: "Notas..." }].map(f => (
              <div key={f.key} style={{ marginBottom: 9 }}><div style={s.label}>{f.label}</div>
                <input style={s.input} value={newPos[f.key]} type={f.type || "text"} placeholder={f.ph} onChange={e => setNewPos(p => ({ ...p, [f.key]: e.target.value }))} />
              </div>
            ))}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9, marginBottom: 14 }}>
              <div><div style={s.label}>TIPO</div><select style={s.input} value={newPos.type} onChange={e => setNewPos(p => ({ ...p, type: e.target.value }))}><option value="largo">Largo plazo</option><option value="swing">Swing</option><option value="observación">Observación</option></select></div>
              <div><div style={s.label}>BOLSA</div><select style={s.input} value={newPos.currency} onChange={e => setNewPos(p => ({ ...p, currency: e.target.value }))}><option value="USD">NYSE (USD)</option><option value="CLP">BSC (CLP)</option></select></div>
            </div>
            <div style={{ display: "flex", gap: 9 }}>
              <button style={{ ...s.btn(), flex: 1, padding: "10px" }} onClick={addPosition}>AGREGAR</button>
              <button style={{ ...s.btn("#445"), flex: 1, padding: "10px" }} onClick={() => setShowAddPos(false)}>CANCELAR</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD WATCHLIST */}
      {showAddWatch && (
        <div style={s.modal} onClick={() => setShowAddWatch(false)}>
          <div style={s.mbox} onClick={e => e.stopPropagation()}>
            <div style={{ fontWeight: 700, marginBottom: 14, letterSpacing: 2, color: "#00e5a0" }}>+ WATCHLIST</div>
            {[{ label: "TICKER", key: "ticker", ph: "MSFT" }, { label: "TESIS", key: "tesis", ph: "Razón..." }, { label: "NOTA", key: "nota", ph: "Notas..." }].map(f => (
              <div key={f.key} style={{ marginBottom: 9 }}><div style={s.label}>{f.label}</div>
                <input style={s.input} value={newWatch[f.key]} placeholder={f.ph}
                  onChange={e => setNewWatch(p => ({ ...p, [f.key]: f.key === "ticker" ? e.target.value.toUpperCase() : e.target.value }))} />
              </div>
            ))}
            <div style={{ marginBottom: 14 }}><div style={s.label}>TIPO</div>
              <select style={s.input} value={newWatch.type} onChange={e => setNewWatch(p => ({ ...p, type: e.target.value }))}>
                <option value="observación">Observación</option><option value="swing">Swing</option><option value="largo">Largo plazo</option>
              </select>
            </div>
            <div style={{ display: "flex", gap: 9 }}>
              <button style={{ ...s.btn(), flex: 1, padding: "10px" }} onClick={addWatchlist}>AGREGAR</button>
              <button style={{ ...s.btn("#445"), flex: 1, padding: "10px" }} onClick={() => setShowAddWatch(false)}>CANCELAR</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD TRANSACTION */}
      {showAddTx && (
        <div style={s.modal} onClick={() => setShowAddTx(false)}>
          <div style={s.mbox} onClick={e => e.stopPropagation()}>
            <div style={{ fontWeight: 700, marginBottom: 14, letterSpacing: 2, color: "#00e5a0" }}>+ TRANSACCIÓN MANUAL</div>
            {[{ label: "TICKER", key: "ticker", ph: "AAPL" }, { label: "FECHA", key: "date", type: "date" }, { label: "CANTIDAD", key: "qty", ph: "100", type: "number" }, { label: "PRECIO", key: "price", ph: "150.00", type: "number" }].map(f => (
              <div key={f.key} style={{ marginBottom: 9 }}><div style={s.label}>{f.label}</div>
                <input style={s.input} value={newTx[f.key]} type={f.type || "text"} placeholder={f.ph} onChange={e => setNewTx(p => ({ ...p, [f.key]: e.target.value }))} />
              </div>
            ))}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 9, marginBottom: 14 }}>
              <div><div style={s.label}>ACCIÓN</div><select style={s.input} value={newTx.action} onChange={e => setNewTx(p => ({ ...p, action: e.target.value }))}><option value="BUY">BUY</option><option value="SELL">SELL</option></select></div>
              <div><div style={s.label}>BOLSA</div><select style={s.input} value={newTx.currency} onChange={e => setNewTx(p => ({ ...p, currency: e.target.value }))}><option value="USD">NYSE (USD)</option><option value="CLP">BSC (CLP)</option></select></div>
            </div>
            <div style={{ display: "flex", gap: 9 }}>
              <button style={{ ...s.btn(), flex: 1, padding: "10px" }} onClick={addTransaction}>REGISTRAR</button>
              <button style={{ ...s.btn("#445"), flex: 1, padding: "10px" }} onClick={() => setShowAddTx(false)}>CANCELAR</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
  </script>
</body>
</html>
